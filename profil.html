<!DOCTYPE html>

<html lang="pl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profil — Destynacje</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef7ea;
}

header{
background:#dff0d8;
padding:20px;
text-align:center;
}

header img{
width:280px;
max-width:90%;
}

nav{
background:#6bbf59;
display:flex;
justify-content:center;
flex-wrap:wrap;
}

nav a{
color:white;
padding:18px 25px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
background:#57a548;
}

.hero{
height:300px;
background:
linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1600&auto=format&fit=crop');

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

color:white;
font-size:50px;
font-weight:bold;
}

#auth-container{
display:flex;
justify-content:center;
gap:60px;
flex-wrap:wrap;
padding:60px 20px;
}

.login-box{
width:360px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
text-align:center;
}

.login-box h2{
margin-bottom:25px;
}

input{
width:90%;
padding:14px;
margin:12px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}

button{
background:#6bbf59;
color:white;
border:none;
padding:14px 22px;
border-radius:10px;
cursor:pointer;
margin:5px;
font-weight:bold;
}

button:hover{
background:#57a548;
}

#account-panel{
display:none;
max-width:600px;
margin:60px auto;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
text-align:center;
}

.account-info{
font-size:18px;
margin:15px 0;
}

.logged{
color:green;
font-weight:bold;
margin-top:20px;
}

</style>

</head>

<body>

<header>
<img src="logo.png" alt="Logo">
</header>

<nav>
<a href="oferty.html">Oferty</a>
<a href="index.html#test">Test podróżnika</a>
<a href="index.html#aktualnosci">Aktualności</a>
<a href="profil.html">Profil</a>
</nav>

<div class="hero">
Moje konto
</div>

<div id="auth-container">

<div class="login-box">

<h2>Logowanie</h2>

<input
id="login-email"
type="email"
placeholder="Email">

<input
id="login-password"
type="password"
placeholder="Hasło">

<br>

<button onclick="login()">
Zaloguj
</button>

<br><br>

<button
onclick="googleLogin()"

style="
background:white;
color:black;
border:1px solid #ccc;
">

Zaloguj przez Google

</button>

</div>

<div class="login-box">

<h2>Rejestracja</h2>

<input
id="username"
type="text"
placeholder="Nazwa użytkownika">

<input
id="register-email"
type="email"
placeholder="Email">

<input
id="register-password"
type="password"
placeholder="Hasło">

<br>

<button onclick="register()">
Załóż konto
</button>

</div>

</div>

<div id="account-panel">

<h2>Moje konto</h2>

<div class="account-info">
<strong>Nazwa użytkownika:</strong>
<span id="account-username"></span>
</div>

<div class="account-info">
<strong>Email:</strong>
<span id="account-email"></span>
</div>

<div class="logged">
Jesteś zalogowany
</div>

<br>

<button onclick="logout()">
Wyloguj
</button>

<a
id="panel-button"
href="panel.html"

style="
display:none;
margin-left:15px;
">

<button>

Panel

</button>

</a>
</div>

<script type="module">

emailjs.init(
"mA1fedfReso-vezqz"
);
  
import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged,
GoogleAuthProvider,
signInWithPopup
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBtMdb6VY6RxNgjPP__vtXdHknufFlaYhs",

authDomain: "destynacje-17720.firebaseapp.com",

projectId: "destynacje-17720",

storageBucket: "destynacje-17720.firebasestorage.app",

messagingSenderId: "538573490778",

appId: "1:538573490778:web:4579e973f76830f27ce663",

measurementId: "G-SXJ8WSY2HX"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider =
new GoogleAuthProvider();

const db = getFirestore(app);

window.register = async function(){

const username =
document.getElementById("username").value;

const email =
document.getElementById("register-email").value;

const password =
document.getElementById("register-password").value;

if(username.length < 3){
alert("Nazwa użytkownika za krótka");
return;
}

const usernameRef =
doc(db,"usernames",username);

const usernameSnap =
await getDoc(usernameRef);

if(usernameSnap.exists()){
alert("Ta nazwa użytkownika już istnieje");
return;
}

createUserWithEmailAndPassword(
auth,
email,
password
)

.then(async(userCredential)=>{

await setDoc(

doc(db,"usernames",username),
{
uid:userCredential.user.uid
}

);

await setDoc(

doc(db,"users",userCredential.user.uid),
{
username:username,
email:email
}

);

alert("Konto utworzone!");

emailjs.send(

"service_tuz3fx4",

"template_neatqvr",

{

username: username,
email: email

}

})

.catch((error)=>{
alert(error.message);
});

}

window.login = function(){

const email =
document.getElementById("login-email").value;

const password =
document.getElementById("login-password").value;

signInWithEmailAndPassword(
auth,
email,
password
)

.then(()=>{
alert("Zalogowano!");
})

.catch((error)=>{
alert(error.message);
});

}

window.logout = function(){

signOut(auth)
.then(()=>{
alert("Wylogowano!");
});

}

onAuthStateChanged(auth, async(user)=>{

if(user){

document.getElementById(
"auth-container"
).style.display = "none";

document.getElementById(
"account-panel"
).style.display = "block";

if(
user.email ===
"u17174405@gmail.com"
){

const panelButton =
document.getElementById(
"panel-button"
);

if(panelButton){

panelButton.style.display =
"inline-block";

}

}

const userRef =
doc(db,"users",user.uid);

const userSnap =
await getDoc(userRef);

if(userSnap.exists()){

const data = userSnap.data();

document.getElementById(
"account-username"
).innerText = data.username;

document.getElementById(
"account-email"
).innerText = data.email;

}

}else{

document.getElementById(
"auth-container"
).style.display = "flex";

document.getElementById(
"account-panel"
).style.display = "none";

}

});


let googleLoading = false;

window.googleLogin =
async function(){

if(googleLoading){
return;
}

googleLoading = true;

try{

const result =
await signInWithPopup(
auth,
provider
);

const user =
result.user;

const userRef =
doc(db,"users",user.uid);

await setDoc(userRef,{

username:
user.displayName,

email:
user.email

},{merge:true});

alert(
"Zalogowano przez Google!"
);

}catch(error){

console.log(error);

alert(error.message);

}

googleLoading = false;

}

</script>
  
<script
type="text/javascript"
src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
</script>
  
</body>
</html>
