<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged,
GoogleAuthProvider,
signInWithPopup,
sendEmailVerification
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
deleteDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBtMdb6VY6RxNgjPP__vtXdHknufFlaYhs",

authDomain: "destynacje-17720.firebaseapp.com",

projectId: "destynacje-17720",

storageBucket: "destynacje-17720.firebasestorage.app",

messagingSenderId: "538573490778",

appId: "1:538573490778:web:4579e973f76830f27ce663",

measurementId: "G-SXJ8WSY2HX"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider =
new GoogleAuthProvider();

const db = getFirestore(app);

window.register = async function(){

const username =
document.getElementById("username").value;

const email =
document.getElementById("register-email").value;

const password =
document.getElementById("register-password").value;

if(username.length < 3){
alert("Nazwa użytkownika za krótka");
return;
}

const activeUsernameRef =
doc(db,"usernames",username);

const activeUsernameSnap =
await getDoc(activeUsernameRef);

if(activeUsernameSnap.exists()){
 alert("Ta nazwa użytkownika już istnieje");
 return;
}

const reservedUsernameRef =
doc(db,"reservedUsernames",username);

const reservedUsernameSnap =
await getDoc(reservedUsernameRef);

if(reservedUsernameSnap.exists()){
 alert("Ta nazwa użytkownika jest obecnie zarezerwowana");
 return;
}

createUserWithEmailAndPassword(
auth,
email,
password
)

.then(async(userCredential)=>{

await setDoc(
 doc(
  db,
  "pendingUsers",
  userCredential.user.uid
 ),
 {
  username:username,
  email:email,
  createdAt:Date.now()
 }
);

await setDoc(
 doc(
  db,
  "reservedUsernames",
  username
 ),
 {
  uid:userCredential.user.uid,
  email:email,
  createdAt:Date.now()
 }
);
 
await sendEmailVerification(
 userCredential.user
);

await signOut(auth);
 
alert(
 "Na podany adres email wysłano link aktywacyjny."
);

})

.catch((error)=>{
alert(error.message);
});

}

window.login = async function(){

const email =
document.getElementById("login-email").value;

const password =
document.getElementById("login-password").value;

try{

const userCredential =
await signInWithEmailAndPassword(
 auth,
 email,
 password
);

await userCredential.user.reload();

if(
 !userCredential.user.emailVerified
){

 await signOut(auth);

 alert(
  "Najpierw potwierdź adres email klikając link wysłany na skrzynkę."
 );

 return;
}

alert("Zalogowano!");

}catch(error){

 alert(error.message);

}

}

window.logout = function(){

signOut(auth)
.then(()=>{
alert("Wylogowano!");
});

}

onAuthStateChanged(auth, async(user)=>{

if(user){

await user.reload();

if(user.emailVerified){

 const pendingRef =
 doc(
  db,
  "pendingUsers",
  user.uid
 );

 const pendingSnap =
 await getDoc(pendingRef);

 if(pendingSnap.exists()){

  const pendingData =
  pendingSnap.data();

  const username =
  pendingData.username;

  await setDoc(
   doc(db,"users",user.uid),
   {
    username: username,
    email: user.email
   }
  );

  await setDoc(
   doc(db,"usernames",username),
   {
    uid:user.uid
   }
  );

 await deleteDoc(
 doc(db,"reservedUsernames",username)
);

  await deleteDoc(
   pendingRef
  );

 }

}

}
 
document.getElementById(
"auth-container"
).style.display = "none";

document.getElementById(
"account-panel"
).style.display = "block";

if(
user.email ===
"u17174405@gmail.com"
){

const panelButton =
document.getElementById(
"panel-button"
);

if(panelButton){

panelButton.style.display =
"inline-block";

}

}

const userRef =
doc(db,"users",user.uid);

const userSnap =
await getDoc(userRef);

if(userSnap.exists()){

const data = userSnap.data();

document.getElementById(
"account-username"
).innerText = data.username;

document.getElementById(
"account-email"
).innerText = data.email;

if(data.travelerType){

document.getElementById(
"traveler-type"
).innerText =
data.travelerType;

}

}

}else{

document.getElementById(
"auth-container"
).style.display = "flex";

document.getElementById(
"account-panel"
).style.display = "none";

}

});


let googleLoading = false;

window.googleLogin =
async function(){

if(googleLoading){
return;
}

googleLoading = true;

try{

const result =
await signInWithPopup(
auth,
provider
);

const user =
result.user;

const userRef =
doc(db,"users",user.uid);

await setDoc(userRef,{

username:
user.displayName,

email:
user.email

},{merge:true});

alert(
"Zalogowano przez Google!"
);

}catch(error){

console.log(error);

alert(error.message);

}

googleLoading = false;

}

</script>
