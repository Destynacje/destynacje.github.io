<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profil — Destynacje</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef7ea;
}

header{
background:#dff0d8;
padding:20px;
text-align:center;
}

header img{
width:280px;
max-width:90%;
}

nav{
background:#6bbf59;
display:flex;
justify-content:center;
}

nav a{
color:white;
padding:18px 25px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
background:#57a548;
}

.hero{
height:300px;
background:
linear-gradient(rgba(0,0,0,0.4),
rgba(0,0,0,0.4)),
url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1600&auto=format&fit=crop');

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

color:white;
font-size:50px;
font-weight:bold;
}

.login-box{

max-width:500px;
margin:50px auto;
background:white;

padding:40px;

border-radius:20px;

box-shadow:0 4px 15px rgba(0,0,0,0.1);

text-align:center;

}

input{

width:90%;

padding:14px;

margin:12px 0;

border-radius:10px;

border:1px solid #ccc;

}

button{

background:#6bbf59;

color:white;

border:none;

padding:14px 22px;

border-radius:10px;

cursor:pointer;

margin:5px;

font-weight:bold;

}

button:hover{
background:#57a548;
}

</style>

</head>

<body>

<header>

<img src="logo.png">

</header>

<nav>

<a href="index.html">Oferty</a>

<a href="index.html#test">
Test podróżnika
</a>

<a href="index.html#aktualnosci">
Aktualności
</a>

<a href="profil.html">
Profil
</a>

</nav>

<div class="hero">

Moje konto

</div>

<div class="login-box">

<h2>Logowanie</h2>

<input id="email"
type="email"
placeholder="Email">

<input id="password"
type="password"
placeholder="Hasło">

<br>

<button onclick="register()">
Załóż konto
</button>

<button onclick="login()">
Zaloguj
</button>

<button onclick="logout()">
Wyloguj
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "TU_WKLEJ_APIKEY",

authDomain: "TU_WKLEJ_AUTHDOMAIN",

projectId: "TU_WKLEJ_PROJECTID",

storageBucket: "TU_WKLEJ_STORAGE",

messagingSenderId: "TU_WKLEJ_SENDERID",

appId: "TU_WKLEJ_APPID"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.register = function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

createUserWithEmailAndPassword(
auth,email,password)

.then(() => {

alert("Konto utworzone!");

})

.catch((error) => {

alert(error.message);

});

}

window.login = function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

signInWithEmailAndPassword(
auth,email,password)

.then(() => {

alert("Zalogowano!");

})

.catch((error) => {

alert(error.message);

});

}

window.logout = function(){

signOut(auth)

.then(() => {

alert("Wylogowano!");

});

}

</script>

</body>
</html>
