<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Panel admina — Destynacje</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef7ea;
}

header{
background:#dff0d8;
padding:20px;
text-align:center;
}

header img{
width:280px;
max-width:90%;
}

nav{
background:#6bbf59;
display:flex;
justify-content:center;
flex-wrap:wrap;
}

nav a{
color:white;
padding:18px 25px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
background:#57a548;
}

.container{

max-width:800px;

margin:50px auto;

padding:40px;

background:white;

border-radius:20px;

box-shadow:0 4px 15px rgba(0,0,0,0.1);

}

h1{

text-align:center;

color:#4f9f3d;

}

input,
textarea{

width:100%;

padding:14px;

margin:12px 0;

border-radius:10px;

border:1px solid #ccc;

font-size:16px;

box-sizing:border-box;

}

textarea{

height:180px;

resize:vertical;

}

button{

background:#6bbf59;
color:white;
border:none;
padding:14px 22px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
font-size:16px;

}

button:hover{
background:#57a548;
}

.success{

margin-top:20px;

color:green;

font-weight:bold;

text-align:center;

}

</style>

</head>

<body>

<header>

<img src="logo.png">

</header>

<nav>

<a href="index.html">Strona główna</a>

<a href="oferty.html">Oferty</a>

<a href="profil.html">Profil</a>

</nav>
  
<div
id="no-access"

style="
display:none;
text-align:center;
padding:80px;
font-size:30px;
font-weight:bold;
color:red;
">

Brak dostępu

</div>
<div
class="container"
id="admin-panel"
style="display:none;">

<h1>Dodaj ofertę</h1>

<input
id="title"
type="text"
placeholder="Tytuł oferty">

<input
id="price"
type="text"
placeholder="Cena">

<input
id="image"
type="file"
accept="image/png, image/jpeg">

<input
id="description"
type="text"
placeholder="Krótki opis">

<textarea
id="details"
placeholder="Pełny opis oferty"></textarea>

<button onclick="addOffer()">
Dodaj ofertę
</button>

<div
class="success"
id="success">
</div>

<hr style="margin:40px 0;">

<h2>Twoje oferty</h2>

<div id="offers-list">

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {

getAuth,
onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  
const firebaseConfig = {

apiKey: "AIzaSyBtMdb6VY6RxNgjPP__vtXdHknufFlaYhs",
  
authDomain: "destynacje-17720.firebaseapp.com",
  
projectId: "destynacje-17720",
  
storageBucket: "destynacje-17720.firebasestorage.app",
  
messagingSenderId: "538573490778",
  
appId: "1:538573490778:web:4579e973f76830f27ce663",
  
measurementId: "G-SXJ8WSY2HX"
  
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let editingOfferId = null;

const auth = getAuth(app);

window.addOffer = async function(){

const title =
document.getElementById("title").value;

const price =
document.getElementById("price").value;

const imageFile =
document.getElementById("image").files[0];

const description =
document.getElementById("description").value;

const details =
document.getElementById("details").value;
const formData = new FormData();

formData.append(
"image",
imageFile
);

const response =
await fetch(

"https://api.imgbb.com/1/upload?key=222928cb2d939b8f9613d5c7d1cb4e43",

{
method:"POST",
body:formData
}

);

const data =
await response.json();

const imageUrl =
data.data.url;
  
if(editingOfferId){

await updateDoc(

doc(db,"offers",editingOfferId),

{

title:title,
price:price,
image:imageUrl,
description:description,
details:details

}

);

editingOfferId = null;

document.getElementById(
"success"
).innerText =
"Oferta zaktualizowana!";

}else{

await addDoc(collection(db,"offers"),{

title:title,
price:price,
image:imageUrl,
description:description,
details:details

});

document.getElementById(
"success"
).innerText =
"Oferta została dodana!";

}

loadOffers();

document.getElementById(
"title"
).value = "";

document.getElementById(
"price"
).value = "";

document.getElementById(
"description"
).value = "";

document.getElementById(
"details"
).value = "";

document.getElementById(
"image"
).value = "";

document.getElementById("title").value = "";

document.getElementById("price").value = "";

document.getElementById("image").value = "";

document.getElementById("description").value = "";

document.getElementById("details").value = "";

}
onAuthStateChanged(auth,(user)=>{

if(user){

if(
user.email ===
"u17174405@gmail.com"
){

document.getElementById(
"admin-panel"
).style.display = "block";

}else{

document.getElementById(
"no-access"
).style.display = "block";

}

}else{

document.getElementById(
"no-access"
).style.display = "block";

}

});
async function loadOffers(){

const offersList =
document.getElementById(
"offers-list"
);

offersList.innerHTML = "";

const querySnapshot =
await getDocs(collection(db,"offers"));

querySnapshot.forEach((offerDoc)=>{

const offer = offerDoc.data();

offersList.innerHTML += `

<div style="

background:#f5f5f5;
padding:20px;
margin:20px 0;
border-radius:15px;

">

<h3>${offer.title}</h3>

<p>${offer.price}</p>

<button
onclick="editOffer('${offerDoc.id}')">

Edytuj

</button>

<button
onclick="deleteOffer('${offerDoc.id}')">

Usuń

</button>

</div>

`;

});

}
window.deleteOffer = async function(id){

const confirmDelete =
confirm(
"Czy na pewno usunąć ofertę?"
);

if(!confirmDelete){
return;
}

await deleteDoc(
doc(db,"offers",id)
);

loadOffers();

}

window.editOffer = async function(id){

editingOfferId = id;

const querySnapshot =
await getDocs(collection(db,"offers"));

querySnapshot.forEach((offerDoc)=>{

if(offerDoc.id === id){

const offer =
offerDoc.data();

document.getElementById(
"title"
).value = offer.title;

document.getElementById(
"price"
).value = offer.price;

document.getElementById(
"description"
).value = offer.description;

document.getElementById(
"details"
).value = offer.details;

window.scrollTo({

top:0,
behavior:"smooth"

});

}

});

}

loadOffers();
</script>

</body>
</html>
