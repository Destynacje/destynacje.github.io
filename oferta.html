<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">

<link
rel="icon"

href="favicon.png">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Oferta — Destynacje</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef7ea;
}

header{
background:#dff0d8;
padding:20px;
text-align:center;
}

header img{
width:280px;
max-width:90%;
}

nav{
background:#6bbf59;
display:flex;
justify-content:center;
flex-wrap:wrap;
}

nav a{
color:white;
padding:18px 25px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
background:#57a548;
}

.hero{

height:400px;

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

color:white;
font-size:60px;
font-weight:bold;

}

.container{

max-width:1000px;

margin:auto;

padding:50px 20px;

}

.card{

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 4px 15px rgba(0,0,0,0.1);

}

.price{

font-size:34px;

font-weight:bold;

margin:20px 0;

color:#4f9f3d;

}

button{

background:#6bbf59;
color:white;
border:none;
padding:14px 22px;
border-radius:10px;
cursor:pointer;
font-weight:bold;

}

button:hover{
background:#57a548;
}

footer{
background:#4f9f3d;
color:white;
text-align:center;
padding:35px;
margin-top:50px;
}

</style>

</head>

<body>

<header>

<img src="logo.png">

</header>

<nav>

<a href="index.html">Strona główna</a>
<a href="oferty.html">Oferty</a>
<a href="test.html">Test DNA podróżnika</a>
<a href="profil.html">Profil</a>

</nav>

<div
class="hero"
id="hero">

</div>

<div class="container">

<div class="card">

<h1 id="title"></h1>

<div
class="price"
id="price">

</div>

<p id="description"></p>

<br>

<h2>Zapytaj o szczegóły</h2>

<form id="contact-form">

<label>Ile osób dotyczy wyjazd?</label>
<br><br>

<input type="number"
id="persons"
required
style="width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;">

<br><br>

<label>Czy chcesz plan wycieczki na każdy dzień?</label>

<br><br>

<select
id="daily_plan"
style="width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;">

<option value="Tak">Tak</option>

<option value="Nie">Nie</option>

</select>

<br><br>

<label>Twój email</label>

<br><br>

<input
type="email"
id="client_email"
required
style="width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;">

<br><br>

<label>Twoja nazwa</label>

<br><br>

<input
type="username"
id="client_username"
required
style="width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;">

<br><br>

<label>Dodatkowa wiadomość</label>

<br><br>

<textarea
id="message"
rows="5"
style="width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;"></textarea>

<br><br>

<button type="submit">
Wyślij zapytanie
</button>

</form>

<br>
<br>

<div
id="status"
style="margin-bottom:25px;font-weight:bold;">
</div>

<h2>Galeria zdjęć</h2>

<div
id="gallery-container"
style="
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
">

</div>

<a href="oferty.html">

<button>
Powrót do ofert
</button>

</a>

</div>

</div>

<footer>

<p>

© Destynacje.pl — Samo się (nie) ogarnie
Kontakt: destynacjepl@gmail.com

</p>

</footer>

<div id="lightbox" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
z-index:9999;
">

<button id="closeLightbox" style="
position:absolute;
top:20px;
right:20px;
font-size:35px;
background:none;
border:none;
color:white;
cursor:pointer;
">
✕
</button>

<button id="prevImage" style="
position:absolute;
left:20px;
top:50%;
transform:translateY(-50%);
font-size:50px;
background:none;
border:none;
color:white;
cursor:pointer;
">
❮
</button>

<img
id="lightboxImage"
style="
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
max-width:90%;
max-height:90%;
border-radius:15px;
">

<button id="nextImage" style="
position:absolute;
right:20px;
top:50%;
transform:translateY(-50%);
font-size:50px;
background:none;
border:none;
color:white;
cursor:pointer;
">
❯
</button>

</div>
  
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
getDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

window.galleryImages = [];
window.currentImageIndex = 0;

const firebaseConfig = {

apiKey: "AIzaSyBtMdb6VY6RxNgjPP__vtXdHknufFlaYhs",
  
authDomain: "destynacje-17720.firebaseapp.com",
  
projectId: "destynacje-17720",
  
storageBucket: "destynacje-17720.firebasestorage.app",
  
messagingSenderId: "538573490778",
  
appId: "1:538573490778:web:4579e973f76830f27ce663",
  
measurementId: "G-SXJ8WSY2HX"
  
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

const params =
new URLSearchParams(window.location.search);

const offerId =
params.get("id");

if(!offerId){

document.body.innerHTML = `
<h1 style="text-align:center;padding:50px;">
Nie wybrano oferty.
</h1>
`;

throw new Error("Brak ID oferty");

}
  
async function loadOffer(){

const docRef =
doc(db,"offers",offerId);

const docSnap =
await getDoc(docRef);

if(docSnap.exists()){

const offer = docSnap.data();

document.getElementById(
"title"
).innerText = offer.title;

document.getElementById(
"price"
).innerText = offer.price;

document.getElementById(
"description"
).innerText = offer.details;

document.getElementById(
"hero"
).style.backgroundImage =
`linear-gradient(rgba(0,0,0,0.4),
rgba(0,0,0,0.4)),
url('${offer.image}')`;

const galleryContainer =
document.getElementById("gallery-container");

galleryContainer.innerHTML = "";
window.galleryImages = offer.gallery || [];
  
if(offer.gallery){

offer.gallery.forEach((img,index)=>{

galleryContainer.innerHTML += `

<img
src="${img}"

style="
width:100%;
border-radius:15px;
cursor:pointer;
height:220px;
object-fit:cover;
"

onclick="openImage(${index})"
>

`;

});

}

}

}

loadOffer();

window.openImage = function(index){

console.log("Kliknięto zdjęcie:", index);

console.log("Galeria:", window.galleryImages);

console.log("URL zdjęcia:", window.galleryImages[index]);

currentImageIndex = index;

document.getElementById("lightbox").style.display = "block";

document.getElementById("lightboxImage").src =
window.galleryImages[index];

}

document.getElementById("closeLightbox")
.addEventListener("click",()=>{

document.getElementById("lightbox").style.display =
"none";

});

document.getElementById("nextImage")
.addEventListener("click",()=>{

currentImageIndex++;

if(currentImageIndex >= window.galleryImages.length){

currentImageIndex = 0;

}

document.getElementById("lightboxImage").src =
window.galleryImages[currentImageIndex];

});

document.getElementById("prevImage")
.addEventListener("click",()=>{

currentImageIndex--;

if(currentImageIndex < 0){

currentImageIndex =
window.galleryImages.length - 1;

}

document.getElementById("lightboxImage").src =
window.galleryImages[currentImageIndex];

});

document.getElementById("lightbox")
.addEventListener("click",(e)=>{

if(e.target.id === "lightbox"){

document.getElementById("lightbox").style.display =
"none";

}

});

onAuthStateChanged(auth, (user) => {

if(user){

const emailField =
document.getElementById("client_email");

const nameField =
document.getElementById("client_username");

emailField.value = user.email || "";

nameField.value = user.displayName || "";

emailField.readOnly = true;

nameField.readOnly = true;

emailField.style.background = "#f0f0f0";

nameField.style.background = "#f0f0f0";

}

});
  
window.emailjs.init("mA1fedfReso-vezqz");

document
.getElementById("contact-form")
.addEventListener("submit", function(e){

e.preventDefault();

window.emailjs.send(
"service_tuz3fx4",
"template_s3wb4ba",
{
offer_title:
document.getElementById("title").innerText,

persons:
document.getElementById("persons").value,

daily_plan:
document.getElementById("daily_plan").value,

client_email:
document.getElementById("client_email").value,

name:
document.getElementById("client_username").value,

message:
document.getElementById("message").value
}

)

.then(function(){

document.getElementById("status").innerHTML =
"✅ Zapytanie zostało wysłane!";

document.getElementById("contact-form").reset();

})

.catch(function(error){

document.getElementById("status").innerHTML =
"❌ Wystąpił błąd.";

console.log(error);

});

});
  
</script>

</body>
</html>
