<title>Oferta — Destynacje</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef7ea;
}

header{
background:#dff0d8;
padding:20px;
text-align:center;
}

header img{
width:280px;
max-width:90%;
}

nav{
background:#6bbf59;
display:flex;
justify-content:center;
flex-wrap:wrap;
}

nav a{
color:white;
padding:18px 25px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
background:#57a548;
}

.hero{

height:400px;

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;

}

.container{

max-width:1000px;

margin:auto;

padding:50px 20px;

}

.card{

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 4px 15px rgba(0,0,0,0.1);

}

.price{

font-size:34px;

margin:20px 0;

}

button{

background:#6bbf59;
color:white;
border:none;
padding:14px 22px;

cursor:pointer;

}

}

</style>

</head>

<body>

<header>

<img src="logo.png">

</header>

<nav>

<a href="index.html">Strona główna</a>

<a href="test.html">Test DNA podróżnika</a>

<a href="oferty.html">Oferty</a>

<a href="profil.html">Profil</a>

</nav>

<div
class="hero"
id="hero">

</div>

<div class="container">

<div class="card">

<h1 id="title"></h1>

<div
class="price"
id="price">

</div>

<p id="description"></p>

<br>

<h2>Zapytaj o szczegóły</h2>

<form id="contact-form">

<label>Ile osób dotyczy wyjazd?</label>
<br><br>

<input type="number"
id="persons"
required
style="width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;">

<br><br>

<label>Czy chcesz plan wycieczki na każdy dzień?</label>

<br><br>

<select
id="daily_plan"
style="width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;">

<option value="Tak">Tak</option>

<option value="Nie">Nie</option>

</select>

<br><br>

<label>Twój email</label>

<br><br>

<input
type="email"
id="client_email"
required
style="width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;">

<br><br>

<label>Twoja nazwa</label>

<br><br>

<input
type="username"
id="client_username"
required
style="width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;">

<br><br>

<label>Dodatkowa wiadomość</label>

<br><br>

<textarea
id="message"
rows="5"
style="width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;"></textarea>

<br><br>

<button type="submit">
Wyślij zapytanie
</button>

</form>

<br>
<br>

<div
id="status"
style="margin-bottom:25px;font-weight:bold;">
</div>
  
<a href="oferty.html">

<button>
Powrót do ofert
</button>

</a>

</div>

</div>

<footer>

<p>

© Destynacje.pl — Samo się (nie) ogarnie
Kontakt: destynacjepl@gmail.com

</p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
getDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyBtMdb6VY6RxNgjPP__vtXdHknufFlaYhs",
  
authDomain: "destynacje-17720.firebaseapp.com",
  
projectId: "destynacje-17720",
  
storageBucket: "destynacje-17720.firebasestorage.app",
  
messagingSenderId: "538573490778",
  
appId: "1:538573490778:web:4579e973f76830f27ce663",
  
measurementId: "G-SXJ8WSY2HX"
  
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

const params =
new URLSearchParams(window.location.search);

const offerId =
params.get("id");

if(!offerId){

document.body.innerHTML = `
<h1 style="text-align:center;padding:50px;">
Nie wybrano oferty.
</h1>
`;

throw new Error("Brak ID oferty");

}
  
async function loadOffer(){

const docRef =
doc(db,"offers",offerId);

const docSnap =
await getDoc(docRef);

if(docSnap.exists()){

const offer = docSnap.data();

document.getElementById(
"title"
).innerText = offer.title;

document.getElementById(
"price"
).innerText = offer.price;

document.getElementById(
"description"
).innerText = offer.details;

document.getElementById(
"hero"
).style.backgroundImage =
`linear-gradient(rgba(0,0,0,0.4),
rgba(0,0,0,0.4)),
url('${offer.image}')`;

}

}

loadOffer();

onAuthStateChanged(auth, (user) => {

if(user){

const emailField =
document.getElementById("client_email");

const nameField =
document.getElementById("client_username");

emailField.value = user.email || "";

nameField.value = user.displayName || "";

emailField.readOnly = true;

nameField.readOnly = true;

emailField.style.background = "#f0f0f0";

nameField.style.background = "#f0f0f0";

}

});
  
window.emailjs.init("mA1fedfReso-vezqz");

document
.getElementById("contact-form")
.addEventListener("submit", function(e){

e.preventDefault();

window.emailjs.send(
"service_tuz3fx4",
"template_s3wb4ba",
{
offer_title:
document.getElementById("title").innerText,

persons:
document.getElementById("persons").value,

daily_plan:
document.getElementById("daily_plan").value,

client_email:
document.getElementById("client_email").value,

name:
document.getElementById("client_username").value,

message:
document.getElementById("message").value
}

)

.then(function(){

document.getElementById("status").innerHTML =
"✅ Zapytanie zostało wysłane!";

document.getElementById("contact-form").reset();

})

.catch(function(error){

document.getElementById("status").innerHTML =
"❌ Wystąpił błąd.";

console.log(error);

});

});
  
</script>

</body>
</html>
