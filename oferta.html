<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
getDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBtMdb6VY6RxNgjPP__vtXdHknufFlaYhs",
  
authDomain: "destynacje-17720.firebaseapp.com",
  
projectId: "destynacje-17720",
  
storageBucket: "destynacje-17720.firebasestorage.app",
  
messagingSenderId: "538573490778",
  
appId: "1:538573490778:web:4579e973f76830f27ce663",
  
measurementId: "G-SXJ8WSY2HX"
  
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const params =
new URLSearchParams(window.location.search);

const offerId =
params.get("id");

async function loadOffer(){

const docRef =
doc(db,"offers",offerId);

const docSnap =
await getDoc(docRef);

if(docSnap.exists()){

const offer = docSnap.data();

document.getElementById(
"title"
).innerText = offer.title;

document.getElementById(
"price"
).innerText = offer.price;

document.getElementById(
"description"
).innerText = offer.details;

document.getElementById(
"hero"
).style.backgroundImage =
`linear-gradient(rgba(0,0,0,0.4),
rgba(0,0,0,0.4)),
url('${offer.image}')`;

}

}

loadOffer();

</script>
