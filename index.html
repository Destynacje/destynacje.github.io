<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Włóczykij - Oferty podróży</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #0f4c81;
      color: white;
      padding: 30px;
      text-align: center;
    }

    .container {
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .offer {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
    }

    button {
      background: #0f4c81;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #093354;
    }
  </style>
</head>

<body>

<header>
  <h1>Włóczykij</h1>
  <p>Najlepsze oferty podróży</p>
</header>

<div class="container">

  <div class="offer">
    <h2>Grecja - Kreta</h2>
    <p>7 dni all inclusive</p>
    <p><strong>2999 zł</strong></p>
    <button>Zobacz ofertę</button>
  </div>

  <div class="offer">
    <h2>Włochy - Rzym</h2>
    <p>Weekend city break</p>
    <p><strong>1499 zł</strong></p>
    <button>Zobacz ofertę</button>
  </div>

</div>

</body>
</html>
