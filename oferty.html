<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Oferty — Destynacje</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef7ea;
}

header{
background:#dff0d8;
padding:20px;
text-align:center;
}

header img{
width:280px;
max-width:90%;
}

nav{
background:#6bbf59;
display:flex;
justify-content:center;
flex-wrap:wrap;
}

nav a{
color:white;
padding:18px 25px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
background:#57a548;
}

.hero{
height:300px;

background:
linear-gradient(rgba(0,0,0,0.4),
rgba(0,0,0,0.4)),
url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1600&auto=format&fit=crop');

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

color:white;
font-size:50px;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:50px 20px;
}

.offers-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));

gap:30px;

}

.offer-card{

background:white;

border-radius:20px;

overflow:hidden;

box-shadow:0 4px 15px rgba(0,0,0,0.1);

transition:0.3s;

}

.offer-card:hover{

transform:translateY(-5px);

}

.offer-card img{

width:100%;
height:220px;
object-fit:cover;

}

.offer-content{

padding:20px;

}

.offer-content h2{

margin-top:0;
color:#4f9f3d;

}

.price{

font-size:24px;
font-weight:bold;
margin:15px 0;
color:#222;

}

button{

background:#6bbf59;
color:white;
border:none;
padding:14px 22px;
border-radius:10px;
cursor:pointer;
font-weight:bold;

}

button:hover{
background:#57a548;
}

</style>

</head>

<body>

<header>

<img src="logo.png">

</header>

<nav>

<a href="index.html">Strona główna</a>

<a href="oferty.html">Oferty</a>

<a href="profil.html">Profil</a>

</nav>

<div class="hero">

Nasze oferty

</div>

<div class="container">

<div class="offers-grid"
id="offers-container">

</div>

</div>

<script type="module">
import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBtMdb6VY6RxNgjPP__vtXdHknufFlaYhs",
  
authDomain: "destynacje-17720.firebaseapp.com",
  
projectId: "destynacje-17720",
  
storageBucket: "destynacje-17720.firebasestorage.app",
  
messagingSenderId: "538573490778",
  
appId: "1:538573490778:web:4579e973f76830f27ce663",
  
measurementId: "G-SXJ8WSY2HX"
  
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const offersContainer =
document.getElementById("offers-container");

async function loadOffers(){

const querySnapshot =
await getDocs(collection(db,"offers"));

querySnapshot.forEach((doc)=>{

const offer = doc.data();

offersContainer.innerHTML += `

<div class="offer-card">

<img src="${offer.image}">

<div class="offer-content">

<h2>${offer.title}</h2>

<p>${offer.description}</p>

<div class="price">
${offer.price}
</div>

<button>
Zobacz ofertę
</button>

</div>

</div>

`;

});

}

loadOffers();

</script>
  
</body>
</html>
